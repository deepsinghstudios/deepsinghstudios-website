<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Day Headshots — Deep Singh Studios</title>
  <meta name="description" content="Consistent, professional headshots for entire teams. Mobile studio setup at your office across Metro Detroit. View our team day portfolio." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Team Day Headshots — Deep Singh Studios" />
  <meta property="og:description" content="Consistent, professional headshots for entire teams — mobile studio setup at your office." />
  <meta property="og:image" content="https://deepsinghstudios.com/images/headshot-w-01.jpg" />
  <meta property="og:url" content="https://deepsinghstudios.com/portfolio-team.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://deepsinghstudios.com/portfolio-team.html" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

<header class="header">
  <a class='header-brand' href='/'>
    <img src="images/lion-logo.png" alt="Deep Singh Studios" />
    <span>DEEP SINGH STUDIOS</span>
  </a>
  <button class="nav-toggle" onclick="document.querySelector('.header-nav').classList.toggle('active')">☰</button>
  <nav class="header-nav">
    <a href='/#works'>Portfolio</a>
    <a href='/#services'>Services</a>
    <a href='/pricing'>Pricing</a>
    <a href='/#contact'>Contact</a>
    <a href='/#about'>About</a>
    <a class='header-cta' href='/booking'>Book Now</a>
  </nav>
  
</header>

<div class="gallery-page">
  <div class="gallery-header">
    <a class='back-link' href='/#works'>&larr; Back to Portfolio</a>
    <p class="eyebrow">Gallery</p>
    <h1>Team Day Headshots</h1>
    <p class="subtitle">Consistent, professional headshots for entire teams — mobile studio setup at your office.</p>
    <p class="count" id="imgCount">Loading...</p>
  </div>
  <div class="gallery-grid" id="gallery"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-counter" id="counter">1 / 1</div>
  <button class="lightbox-prev" onclick="event.stopPropagation(); prevImg()">&#8249;</button>
  <button class="lightbox-next" onclick="event.stopPropagation(); nextImg()">&#8250;</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
</div>

<script>
const images = [
  'images/headshot-w-01.jpg','images/headshot-w-02.jpg','images/headshot-w-03.jpg',
  'images/headshot-w-04.jpg','images/headshot-w-05.jpg','images/headshot-w-06.jpg',
  'images/headshot-w-07.jpg','images/headshot-w-08.jpg','images/headshot-w-09.jpg',
  'images/headshot-w-10.jpg','images/headshot-w-11.jpg','images/headshot-w-12.jpg',
  'images/headshot-w-13.jpg','images/headshot-w-14.jpg','images/headshot-w-15.jpg',
  'images/headshot-w-16.jpg','images/headshot-w-17.jpg','images/headshot-w-18.jpg',
  'images/headshot-w-19.jpg','images/headshot-w-20.jpg','images/headshot-w-21.jpg',
  'images/headshot-w-22.jpg'
];
let current = 0;
function renderGallery() {
  document.getElementById('gallery').innerHTML = images.map((src, i) => `
    <div class="gallery-item" onclick="openLightbox(${i})"><img src="${src}" alt="Team ${i+1}" loading="lazy" /></div>
  `).join('');
  document.getElementById('imgCount').textContent = images.length + ' images';
}
function openLightbox(i) { current = i; document.getElementById('lightboxImg').src = images[current]; document.getElementById('lightbox').classList.add('active'); document.getElementById('counter').textContent = (current + 1) + ' / ' + images.length; document.body.style.overflow = 'hidden'; }
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; }
function prevImg() { current = (current - 1 + images.length) % images.length; document.getElementById('lightboxImg').src = images[current]; document.getElementById('counter').textContent = (current + 1) + ' / ' + images.length; }
function nextImg() { current = (current + 1) % images.length; document.getElementById('lightboxImg').src = images[current]; document.getElementById('counter').textContent = (current + 1) + ' / ' + images.length; }
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') prevImg(); if (e.key === 'ArrowRight') nextImg();
});
renderGallery();
</script>

</body>
</html>
