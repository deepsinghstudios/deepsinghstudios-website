<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Individual Headshots — Deep Singh Studios</title>
  <meta name="description" content="Executive portraits, leadership photos, and professional headshots for individuals across Metro Detroit. View our portfolio of 39+ individual headshot sessions." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Individual Headshots — Deep Singh Studios" />
  <meta property="og:description" content="Executive portraits and professional headshots for individuals across Metro Detroit." />
  <meta property="og:image" content="https://deepsinghstudios.com/images/headshot-d-15.jpg" />
  <meta property="og:url" content="https://deepsinghstudios.com/portfolio-individual.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://deepsinghstudios.com/portfolio-individual.html" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class='header-brand' href='/'>
    <img src="images/lion-logo.png" alt="Deep Singh Studios" />
    <span>DEEP SINGH STUDIOS</span>
  </a>
  <button class="nav-toggle" onclick="document.querySelector('.header-nav').classList.toggle('active')">☰</button>
  <nav class="header-nav">
    <a href='/#works'>Portfolio</a>
    <a href='/#services'>Services</a>
    <a href='/pricing'>Pricing</a>
    <a href='/#contact'>Contact</a>
    <a href='/#about'>About</a>
    <a class='header-cta' href='/booking'>Book Now</a>
  </nav>
  
</header>

<!-- GALLERY -->
<div class="gallery-page">
  <div class="gallery-header">
    <a class='back-link' href='/#works'>&larr; Back to Portfolio</a>
    <p class="eyebrow">Gallery</p>
    <h1>Individual Headshots</h1>
    <p class="subtitle">Executive portraits, leadership photos, and professional headshots for individuals across Metro Detroit.</p>
    <p class="count" id="imgCount">Loading...</p>
  </div>

  <div class="gallery-grid" id="gallery"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-counter" id="counter">1 / 1</div>
  <button class="lightbox-prev" onclick="event.stopPropagation(); prevImg()">&#8249;</button>
  <button class="lightbox-next" onclick="event.stopPropagation(); nextImg()">&#8250;</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
</div>

<script>
const images = [
  'images/headshot-d-15.jpg','images/headshot-d-07.jpg','images/headshot-d-01.jpg',
  'images/headshot-d-02.jpg','images/headshot-d-03.jpg',
  'images/headshot-d-05.jpg','images/headshot-d-06.jpg','images/headshot-d-08.jpg',
  'images/headshot-d-09.jpg','images/headshot-d-10.jpg','images/headshot-d-11.jpg',
  'images/headshot-d-12.jpg','images/headshot-d-13.jpg','images/headshot-d-14.jpg',
  'images/headshot-d-16.jpg','images/headshot-d-17.jpg','images/headshot-d-18.jpg',
  'images/headshot-d-19.jpg'
];

let current = 0;

function renderGallery() {
  const grid = document.getElementById('gallery');
  grid.innerHTML = images.map((src, i) => `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${src}" alt="Headshot ${i+1}" loading="lazy" />
    </div>
  `).join('');
  document.getElementById('imgCount').textContent = images.length + ' images';
}

function openLightbox(i) {
  current = i;
  document.getElementById('lightboxImg').src = images[current];
  document.getElementById('lightbox').classList.add('active');
  document.getElementById('counter').textContent = (current + 1) + ' / ' + images.length;
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function prevImg() {
  current = (current - 1 + images.length) % images.length;
  document.getElementById('lightboxImg').src = images[current];
  document.getElementById('counter').textContent = (current + 1) + ' / ' + images.length;
}

function nextImg() {
  current = (current + 1) % images.length;
  document.getElementById('lightboxImg').src = images[current];
  document.getElementById('counter').textContent = (current + 1) + ' / ' + images.length;
}

document.addEventListener('keydown', function(e) {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevImg();
  if (e.key === 'ArrowRight') nextImg();
});

renderGallery();
</script>

</body>
</html>
